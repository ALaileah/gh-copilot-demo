name: Build and Deploy Application to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
  API_IMAGE_NAME: albums-api
  VIEWER_IMAGE_NAME: album-viewer
  APP_SERVICE_NAME: ${{ vars.APP_SERVICE_NAME }}
  VIEWER_APP_SERVICE_NAME: ${{ vars.VIEWER_APP_SERVICE_NAME }}

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with federated managed identity
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUB_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./albums-api
          file: ./albums-api/Dockerfile
          push: true
          tags: ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.API_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push viewer image
        uses: docker/build-push-action@v6
        with:
          context: ./album-viewer
          file: ./album-viewer/Dockerfile
          push: true
          tags: ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.VIEWER_IMAGE_NAME }}:${{ github.sha }}

      - name: Update API App Service container image
        run: |
          az webapp config container set \
            --name ${{ vars.APP_SERVICE_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.API_IMAGE_NAME }}:${{ github.sha }} \
            --docker-registry-server-url https://${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io

      - name: Update Viewer App Service container image
        run: |
          az webapp config container set \
            --name ${{ vars.VIEWER_APP_SERVICE_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.VIEWER_IMAGE_NAME }}:${{ github.sha }} \
            --docker-registry-server-url https://${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io
